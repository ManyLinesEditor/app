name: manylines_editor
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_quill: ^11.5.0
  dart_quill_delta: ^10.8.3
  provider: ^6.1.2
  flutter_riverpod: ^2.4.9
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_light.png
    - assets/images/logo_dark.png
  
  fonts:
    - family: Ostrovsky
      fonts:
        - asset: assets/fonts/Ostrovsky-Bold_0.otf
          weight: 700
    - family: LT Remark
      fonts:
        - asset: assets/fonts/LTRemark-Regular.otf
          weight: 700
